name: Release Alpha and Propose Stable

on:
  pull_request:
    types: [closed]
    branches: [dev]

jobs:
  publish_alpha:
    if: github.event.pull_request.merged == true
    uses: TigreGotico/gh-automations/.github/workflows/publish-alpha.yml@master
    secrets: inherit
    with:
      branch: 'dev'
      version_file: 'nebulento/version.py'
      setup_py: 'setup.py'
      update_changelog: true
      publish_prerelease: true
      changelog_max_issues: 100

  notify:
    if: github.event.pull_request.merged == true
    needs: publish_alpha
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send message to Matrix bots channel
        id: matrix-chat-message
        uses: fadenb/matrix-chat-message@v0.0.6
        with:
          homeserver: 'matrix.org'
          token: ${{ secrets.MATRIX_TOKEN }}
          channel: '!WjxEKjjINpyBRPFgxl:krbel.duckdns.org'
          message: |
            new ${{ github.event.repository.name }} PR merged! https://github.com/${{ github.repository }}/pull/${{ github.event.number }}

  publish_pypi:
    needs: publish_alpha
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install Build Tools
        run: |
          python -m pip install build hatchling
      - name: Build Distribution Packages
        run: |
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@master
        with:
          password: ${{secrets.PYPI_TOKEN}}

  propose_release:
    needs: publish_alpha
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          python -m pip install hatchling
          VERSION=$(python -c "import tomllib; data=tomllib.load(open('pyproject.toml','rb')); print(data['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create and push new branch
        run: |
          git checkout -b release-${{ env.VERSION }}
          git push origin release-${{ env.VERSION }}

      - name: Open Pull Request from dev to master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="release-${{ env.VERSION }}"
          BASE_BRANCH="master"
          HEAD_BRANCH="release-${{ env.VERSION }}"
          PR_TITLE="Release ${{ env.VERSION }}"
          PR_BODY="Human review requested!"

          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -d "{\"title\":\"$PR_TITLE\",\"body\":\"$PR_BODY\",\"head\":\"$HEAD_BRANCH\",\"base\":\"$BASE_BRANCH\"}" \
            https://api.github.com/repos/${{ github.repository }}/pulls
